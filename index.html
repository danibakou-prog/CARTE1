<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التفعيل | Orange Style</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            /* Orange Brand Colors */
            --orange-primary: #FF6B35;
            --orange-secondary: #F7931E;
            --orange-gradient: linear-gradient(135deg, #FF6B35 0%, #FF8E53 50%, #F7931E 100%);
            --orange-light: #FFF5F0;
            --orange-bg: #FFFBF9;
            --orange-text: #1A1B22;
            --orange-glow: rgba(255, 107, 53, 0.5);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--orange-bg);
            background-image: radial-gradient(circle at 2px 2px, rgba(255, 107, 53, 0.1) 1px, transparent 0);
            background-size: 28px 28px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 107, 53, 0.15);
            box-shadow: 0 25px 50px -12px rgba(255, 107, 53, 0.2);
            border-radius: 2rem;
            overflow: hidden;
        }

        .token-hero {
            background: var(--orange-gradient);
            position: relative;
            overflow: hidden;
        }

        .token-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(2%, 2%); }
        }

        /* === كود واضح ومضيء === */
        .code-display {
            color: #FFFFFF;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.08em;
            text-shadow: 
                0 0 10px rgba(255,255,255,0.8),
                0 0 20px rgba(255,255,255,0.6),
                0 0 30px var(--orange-glow);
            font-weight: 900;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .code-box {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            box-shadow: 
                0 0 0 4px rgba(255,255,255,0.1),
                0 8px 32px rgba(0,0,0,0.2);
            backdrop-filter: blur(8px);
        }

        .code-box:hover {
            border-color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 0 0 4px rgba(255,255,255,0.2),
                0 12px 40px rgba(0,0,0,0.3);
        }

        .btn-orange {
            background: var(--orange-gradient);
            transition: all 0.25s ease;
            cursor: pointer;
            border: none;
            outline: none;
            box-shadow: 0 4px 14px rgba(255, 107, 53, 0.4);
        }

        .btn-orange:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.6);
            filter: brightness(1.05);
        }

        .btn-orange:active {
            transform: scale(0.98);
        }

        @keyframes pulse-orange {
            0% { box-shadow: 0 0 0 0 rgba(255, 107, 53, 0.5); }
            70% { box-shadow: 0 0 0 18px rgba(255, 107, 53, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 53, 0); }
        }

        .pulse-active {
            animation: pulse-orange 2s infinite;
        }

        .step-card {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }

        .step-card:hover {
            border-left-color: var(--orange-primary);
            background: var(--orange-light);
            transform: translateX(4px);
        }

        .step-number {
            background: var(--orange-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        /* تأثير وميض للكود عند النسخ */
        @keyframes code-flash {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); filter: brightness(1.2); }
        }
        .code-flashed {
            animation: code-flash 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="max-w-md w-full glass-card rounded-[2.5rem] overflow-hidden">
        <!-- Section 1: The Token -->
        <div class="token-hero p-8 text-center relative">
            <div class="flex justify-center mb-4 relative z-10">
                <div class="w-14 h-14 bg-white/25 rounded-2xl flex items-center justify-center backdrop-blur-md border border-white/30 shadow-lg">
                    <i data-lucide="zap" class="w-7 h-7 text-white drop-shadow-md"></i>
                </div>
            </div>
            
            <h2 class="text-white/95 text-[11px] font-bold tracking-[0.35em] uppercase mb-4 text-center w-full relative z-10 drop-shadow-sm">كود التفعيل المميز (15 خانة)</h2>
            
            <!-- Clickable Code Area - واضح ومضيء -->
            <button onclick="copyToClipboard()" class="code-box w-full cursor-pointer group relative py-5 px-4 rounded-2xl transition-all focus:outline-none relative z-10">
                <div id="tokenValue" class="code-display text-4xl md:text-5xl mb-3 pointer-events-none tracking-widest">
                    RYL99XVP215Z88W
                </div>
                <div class="flex items-center justify-center gap-2 text-white/90 text-[11px] font-bold pointer-events-none bg-white/20 px-4 py-2 rounded-full mx-auto w-fit">
                    <i data-lucide="copy" class="w-4 h-4"></i>
                    اضغط لنسخ الكود
                </div>
            </button>

            <!-- Main Copy Button -->
            <button onclick="copyToClipboard()" class="btn-orange pulse-active mt-7 w-full py-4.5 rounded-2xl flex items-center justify-center gap-3 text-white font-black text-sm uppercase relative z-10 shadow-lg">
                <i data-lucide="clipboard-copy" class="w-5 h-5"></i>
                نسخ الكود والانتقال إلى aviso
            </button>
        </div>

        <!-- Section 2: Instructions -->
        <div class="p-8 bg-white">
            <div class="flex items-center gap-3 mb-6">
                <div class="h-6 w-1 bg-gradient-to-b from-[#FF6B35] to-[#F7931E] rounded-full"></div>
                <h3 class="font-black text-gray-800 text-lg">تعليمات التفعيل</h3>
            </div>

            <div class="space-y-4">
                <div class="step-card flex items-start gap-4 p-4 rounded-2xl bg-gray-50 border border-gray-100">
                    <span class="step-number text-xl font-black min-w-[28px]">01</span>
                    <p class="text-sm text-gray-600 font-bold leading-relaxed">انسخ الرمز البرتقالي المكون من 15 خانة الموضح أعلاه.</p>
                </div>
                
                <div class="step-card flex items-start gap-4 p-4 rounded-2xl bg-gray-50 border border-gray-100">
                    <span class="step-number text-xl font-black min-w-[28px]">02</span>
                    <p class="text-sm text-gray-600 font-bold leading-relaxed">الصق الرمز داخل خانة التفعيل في تطبيقك الخاص.</p>
                </div>
            </div>

            <div class="mt-10 pt-6 border-t border-gray-100 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <i data-lucide="shield-check" class="w-4 h-4 text-[#FF6B35]"></i>
                    <span class="text-[10px] font-black text-gray-400 uppercase">نظام آمن ومحمي</span>
                </div>
                <div id="clock" class="text-[10px] font-mono text-gray-400 bg-gray-50 px-3 py-1 rounded-full border border-gray-100">
                    00:00:00
                </div>
            </div>
        </div>
    </div>

    <!-- Success Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-500 z-[9999]">
        <div class="bg-gray-900 text-white px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-4 border border-white/10">
            <div class="bg-[#FF6B35]/20 p-2 rounded-full animate-pulse">
                <i data-lucide="check" class="text-[#FF8E53] w-4 h-4"></i>
            </div>
            <span class="text-sm font-bold">تم نسخ الرمز! جاري التحويل...</span>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // === رابط aviso - عدله حسب الحاجة ===
        const AVISO_URL = "aviso.html"; // أو "https://yoursite.com/aviso" أو "#aviso"

        function copyToClipboard() {
            const codeText = "RYL99XVP215Z88W";
            
            // تأثير بصري على الكود عند النسخ
            const codeEl = document.getElementById('tokenValue');
            codeEl.classList.add('code-flashed');
            setTimeout(() => codeEl.classList.remove('code-flashed'), 300);
            
            // First Attempt: Modern Navigator API
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(codeText)
                    .then(() => {
                        showSuccessAndRedirect();
                    })
                    .catch(() => {
                        fallbackCopy(codeText);
                    });
            } else {
                // Second Attempt: Legacy Fallback
                fallbackCopy(codeText);
            }
        }

        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            textArea.style.top = "0";
            document.body.appendChild(textArea);
            
            textArea.focus();
            textArea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showSuccessAndRedirect();
                } else {
                    console.error("Copy command failed");
                    alert("تعذر نسخ الكود، يرجى نسخه يدوياً");
                }
            } catch (err) {
                console.error("Fallback copy error:", err);
                alert("حدث خطأ أثناء النسخ");
            }
            
            document.body.removeChild(textArea);
        }

        function showSuccessAndRedirect() {
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            // اهتزاز إذا مدعوم
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate([50, 30, 50]);
            }

            // === التحويل إلى رابط aviso بعد 1.2 ثانية ===
            setTimeout(() => {
                window.location.href = AVISO_URL;
            }, 1200);

            // إخفاء التوست بعد 3 ثواني (احتياطياً)
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // Clock Logic
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-GB', { hour12: false });
            const clockEl = document.getElementById('clock');
            if (clockEl) clockEl.innerText = timeString;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
