<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التفعيل الملكية | Royal Activation</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --pure-orange: #FF8C00; 
            --royal-black: #0f1115;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f3f4f6;
            background-image: radial-gradient(circle at 2px 2px, rgba(255, 140, 0, 0.05) 1px, transparent 0);
            background-size: 32px 32px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        .token-hero {
            background: var(--royal-black);
            position: relative;
            overflow: hidden;
        }

        .orange-text {
            color: var(--pure-orange);
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.1em; /* Increased spacing for clarity at smaller size */
        }

        .btn-orange {
            background-color: var(--pure-orange);
            color: white;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            outline: none;
        }

        .btn-orange:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 10px 20px -5px rgba(255, 140, 0, 0.4);
        }

        /* المربع المخصص للكود */
        .code-border-container {
            border: 2px dashed var(--pure-orange);
            background: rgba(255, 140, 0, 0.03);
            transition: all 0.3s ease;
            max-width: 280px; /* تحديد عرض الإطار */
            margin: 0 auto; /* توسيط الإطار */
        }

        @keyframes pulse-orange {
            0% { box-shadow: 0 0 0 0 rgba(255, 140, 0, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 140, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 140, 0, 0); }
        }

        .pulse-active {
            animation: pulse-orange 2s infinite;
        }
    </style>
</head>
<body>

    <div class="max-w-md w-full glass-card rounded-[2.5rem] overflow-hidden">
        <!-- Section 1: The Token -->
        <div class="token-hero p-8 text-center relative">
            <div class="flex justify-center mb-4">
                <div class="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-md border border-white/10">
                    <i data-lucide="key-round" class="w-6 h-6 text-[#FF8C00]"></i>
                </div>
            </div>
            
            <h2 class="text-gray-400 text-[10px] font-bold tracking-[0.3em] uppercase mb-4 text-center w-full">كود التفعيل المميز</h2>
            
            <!-- Clickable Code Area (Smaller text inside the frame) -->
            <button onclick="copyToClipboard()" class="w-full cursor-pointer group relative py-4 px-2 rounded-xl code-border-container focus:outline-none">
                <div id="tokenValue" class="orange-text text-xl md:text-2xl font-black mb-1 pointer-events-none">
                    P9L4W2QC11NT33K
                </div>
                <div class="flex items-center justify-center gap-2 text-gray-500 text-[9px] font-bold pointer-events-none uppercase">
                    <i data-lucide="copy" class="w-3 h-3"></i>
                    اضغط للنسخ
                </div>
            </button>

            <!-- Main Copy Button -->
            <button onclick="copyToClipboard()" class="btn-orange pulse-active mt-6 w-full py-4 rounded-2xl flex items-center justify-center gap-3 font-black text-sm uppercase">
                <i data-lucide="clipboard-check" class="w-5 h-5"></i>
                نسخ الكود الآن
            </button>
        </div>

        <!-- Section 2: Instructions -->
        <div class="p-8 bg-white">
            <div class="flex items-center gap-3 mb-6">
                <div class="h-6 w-1 bg-[#FF8C00] rounded-full"></div>
                <h3 class="font-black text-gray-800 text-lg">تعليمات التفعيل</h3>
            </div>

            <div class="space-y-4">
                <div class="flex items-start gap-4 p-4 rounded-2xl bg-gray-50 border border-gray-100">
                    <span class="text-[#FF8C00] text-xl font-black">01</span>
                    <p class="text-sm text-gray-600 font-bold leading-relaxed">انسخ الرمز البرتقالي الموضح في الإطار أعلاه.</p>
                </div>
                
                <div class="flex items-start gap-4 p-4 rounded-2xl bg-gray-50 border border-gray-100">
                    <span class="text-[#FF8C00] text-xl font-black">02</span>
                    <p class="text-sm text-gray-600 font-bold leading-relaxed">استخدم الرمز لتفعيل اشتراكك داخل التطبيق فوراً.</p>
                </div>
            </div>

            <div class="mt-10 pt-6 border-t border-gray-100 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <i data-lucide="shield" class="w-4 h-4 text-emerald-500"></i>
                    <span class="text-[10px] font-black text-gray-400 uppercase">نظام مشفر بالكامل</span>
                </div>
                <div id="clock" class="text-[10px] font-mono text-gray-400 bg-gray-50 px-3 py-1 rounded-full border border-gray-100">
                    00:00:00
                </div>
            </div>
        </div>
    </div>

    <!-- Success Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-500 z-[9999]">
        <div class="bg-gray-900 text-white px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-4 border border-white/10">
            <div class="bg-emerald-500/20 p-2 rounded-full">
                <i data-lucide="check" class="text-emerald-400 w-4 h-4"></i>
            </div>
            <span class="text-sm font-bold">تم نسخ الرمز بنجاح!</span>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function copyToClipboard() {
            const codeText = "RYL99XVP215Z88W";
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(codeText).then(showSuccess).catch(() => fallbackCopy(codeText));
            } else {
                fallbackCopy(codeText);
            }
        }

        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try { document.execCommand('copy'); showSuccess(); } catch (err) {}
            document.body.removeChild(textArea);
        }

        function showSuccess() {
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-20', 'opacity-0');
            if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(50);
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 2500);
        }

        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-GB', { hour12: false });
            const clockEl = document.getElementById('clock');
            if (clockEl) clockEl.innerText = timeString;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
