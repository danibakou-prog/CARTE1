<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التفعيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #FFFAF5; }
        .orange-grad { background: linear-gradient(135deg, #FF6600 0%, #FF8000 100%); }
        .code-font { font-family: 'Montserrat', sans-serif; font-size: 1.6rem; letter-spacing: 1px; }
        @keyframes flash { 50% { opacity: 0.5; transform: scale(1.05); } }
        .flashing { animation: flash 0.3s; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-5">

    <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-orange-100">
        <!-- الرأس والكود -->
        <div class="orange-grad p-8 text-center text-white">
            <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-white/30">
                <i data-lucide="key-round" class="w-8 h-8"></i>
            </div>
            <h2 class="text-[11px] font-bold tracking-widest uppercase mb-4 opacity-90">كود التفعيل الخاص بك</h2>
            
            <div onclick="copyAndGo()" class="cursor-pointer bg-white/10 border-2 border-white/30 p-5 rounded-2xl transition-all hover:bg-white/20 mb-6">
                <div id="codeDisplay" class="code-font font-extrabold mb-2"></div>
                <div class="text-[10px] font-bold bg-black/20 inline-block px-3 py-1 rounded-full">اضغط للنسخ</div>
            </div>

            <button onclick="copyAndGo()" class="w-full bg-white text-[#FF6600] py-4 rounded-xl font-black text-sm shadow-lg hover:bg-orange-50 transition-transform active:scale-95">
                نسخ الكود والانتقال للتفعيل
            </button>
        </div>

        <!-- التعليمات -->
        <div class="p-8 space-y-4">
            <h3 class="font-black text-gray-800 flex items-center gap-2">
                <span class="w-1.5 h-5 bg-[#FF6600] rounded-full"></span> خطوات التفعيل
            </h3>
            <div class="bg-gray-50 p-4 rounded-xl border-r-4 border-[#FF6600] text-xs font-bold text-gray-600">01. انسخ الرمز المكون من 15 خانة أعلاه.</div>
            <div class="bg-gray-50 p-4 rounded-xl border-r-4 border-[#FF6600] text-xs font-bold text-gray-600">02. الصق الرمز في المكان المخصص بالتطبيق.</div>
            
            <div class="pt-4 flex justify-between items-center text-[10px] font-bold text-gray-400">
                <span class="flex items-center gap-1"><i data-lucide="lock" class="w-3 text-[#FF6600]"></i> نظام آمن</span>
                <span id="clock" class="bg-gray-100 px-2 py-1 rounded">00:00:00</span>
            </div>
        </div>
    </div>

    <!-- إشعار النجاح -->
    <div id="toast" class="fixed bottom-10 opacity-0 transition-all duration-500 pointer-events-none">
        <div class="bg-gray-900 text-white px-6 py-3 rounded-xl shadow-xl text-sm font-bold flex items-center gap-2">
            <i data-lucide="check-circle" class="text-[#FF6600]"></i> تم النسخ! جاري التحويل...
        </div>
    </div>

    <script>
        // ==========================================
        //  إعدادات الكود والرابط (سهلة التغيير)
        // ==========================================
        const MY_CODE = "RYL99XVP215Z88W";
        const MY_LINK = "https://danibakou-prog.github.io/canno/";
        // ==========================================

        document.getElementById('codeDisplay').innerText = MY_CODE;
        lucide.createIcons();

        function copyAndGo() {
            // تأثير بصري
            const el = document.getElementById('codeDisplay');
            el.classList.add('flashing');
            setTimeout(() => el.classList.remove('flashing'), 300);

            // عملية النسخ
            const input = document.createElement("textarea");
            input.value = MY_CODE;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);

            // إظهار التوست والتحويل
            const toast = document.getElementById('toast');
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => { window.location.href = MY_LINK; }, 1000);
        }

        // الساعة
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);
    </script>
</body>
</html>
